<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حاسبة النقاط</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --border-color: #333333;
            --text-color: #e0e0e0;
            --text-muted: #a0a0a0;
            --accent-color: #ffffff;
            --input-bg: #252525;
            --active-tab: #2d2d2d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.5);
        }

        /* نظام التبويب العلوي */
        .tabs {
            display: flex;
            background-color: #1a1a1a;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            flex: 1;
            padding: 15px 10px;
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .tab-btn:hover {
            color: var(--accent-color);
            background-color: rgba(255, 255, 255, 0.02);
        }

        .tab-btn.active {
            color: var(--accent-color);
            background-color: var(--active-tab);
            border-bottom: 2px solid var(--accent-color);
        }

        /* محتوى التيمات */
        .tab-content {
            padding: 25px;
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        h2 {
            margin-bottom: 20px;
            font-size: 22px;
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        .input-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: var(--text-muted);
        }

        input[type="number"] {
            width: 100%;
            padding: 12px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            color: var(--text-color);
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input[type="number"]:focus {
            border-color: var(--accent-color);
        }

        /* النتيجة والافضلية */
        .result-box {
            margin-top: 25px;
            padding: 15px;
            background-color: #1a1a1a;
            border: 1px dashed var(--border-color);
            border-radius: 6px;
            text-align: center;
        }

        .result-box span {
            font-size: 14px;
            color: var(--text-muted);
            display: block;
            margin-bottom: 5px;
        }

        .result-box .points {
            font-size: 32px;
            font-weight: bold;
            color: var(--accent-color);
        }

        .note {
            font-size: 12px;
            color: #777;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button class="tab-btn active" onclick="openTeam(event, 'ticket-team')">Ticket Team</button>
        <button class="tab-btn" onclick="openTeam(event, 'chat-team')">Chat Team</button>
        <button class="tab-btn" onclick="openTeam(event, 'voice-team')">Voice Team</button>
    </div>

    <div id="ticket-team" class="tab-content active">
        <h2>نظام تيم التيكت</h2>
        <div class="input-group">
            <label>عدد التيكت الاجمالي (Tickets)</label>
            <input type="number" id="t-tickets" value="0" min="0" oninput="calcTicket()">
        </div>
        <div class="input-group">
            <label>عدد تيكت السكام (Scam Tickets)</label>
            <input type="number" id="t-scam" value="0" min="0" oninput="calcTicket()">
        </div>
        <div class="input-group">
            <label>الخبرة (XP)</label>
            <input type="number" id="t-xp" value="0" min="0" oninput="calcTicket()">
        </div>
        <div class="input-group">
            <label>عدد البندات (Bans)</label>
            <input type="number" id="t-bans" value="0" min="0" oninput="calcTicket()">
        </div>
        <div class="result-box">
            <span>مجموع النقاط الحالي</span>
            <div class="points" id="ticket-points">0</div>
            <div class="note">يتم خصم تيكت السكام تلقائيا من التيكت العادي قبل الحساب</div>
        </div>
    </div>

    <div id="chat-team" class="tab-content">
        <h2>نظام تيم الشات</h2>
        <div class="input-group">
            <label>الخبرة (XP)</label>
            <input type="number" id="c-xp" value="0" min="0" oninput="calcChat()">
        </div>
        <div class="input-group">
            <label>عدد التحذيرات (Warns)</label>
            <input type="number" id="c-warns" value="0" min="0" oninput="calcChat()">
        </div>
        <div class="input-group">
            <label>عدد الايفنتات (Events)</label>
            <input type="number" id="c-events" value="0" min="0" oninput="calcChat()">
        </div>
        <div class="result-box">
            <span>مجموع النقاط الحالي</span>
            <div class="points" id="chat-points">0</div>
        </div>
    </div>

    <div id="voice-team" class="tab-content">
        <h2>نظام تيم الفويس</h2>
        <div class="input-group">
            <label>خبرة الفويس (Voice XP
