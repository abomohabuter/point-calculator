<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Points Calculator</title>
    <style>
        :root {
            --bg-main: #121212;
            --bg-card: #1e1e1e;
            --bg-input: #2d2d2d;
            --text-main: #ffffff;
            --text-sub: #b3b3b3;
            --border-color: #3d3d3d;
            --accent: #ffffff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header {
            width: 100%;
            max-width: 800px;
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* شريط التنقل */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            background-color: var(--bg-card);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-bottom: 30px;
            width: 100%;
            max-width: 600px;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--text-sub);
            padding: 12px 24px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s ease;
            flex: 1;
        }

        .tab-btn:hover {
            color: var(--text-main);
            background-color: var(--bg-input);
        }

        .tab-btn.active {
            background-color: var(--accent);
            color: var(--bg-main);
        }

        /* الحاويات والقوائم */
        .content-container {
            width: 100%;
            max-width: 600px;
        }

        .team-section {
            display: none;
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .team-section.active {
            display: block;
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
            color: var(--text-main);
        }

        .input-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.9rem;
            color: var(--text-sub);
            font-weight: 500;
        }

        input {
            background-color: var(--bg-input);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input:focus {
            border-color: var(--accent);
        }

        /* لوحة عرض النتيجة */
        .result-panel {
            margin-top: 30px;
            background-color: #1a1a1a;
            border-left: 4px solid var(--accent);
            padding: 20px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .result-title {
            font-size: 1.1rem;
            color: var(--text-sub);
            font-weight: 600;
        }

        .points-display {
            font-size: 2rem;
            font-weight: 700;
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <header>
        <h1>Team System Dashboard</h1>
    </header>

    <!-- أزرار التنقل السريع -->
    <nav class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('ticket')">Ticket Team</button>
        <button class="tab-btn" onclick="switchTab('chat')">Chat Team</button>
        <button class="tab-btn" onclick="switchTab('voice')">Voice Team</button>
    </nav>

    <div class="content-container">
        
        <!-- Ticket Team Section -->
        <section id="ticket" class="team-section active">
            <h2>Ticket Team System</h2>
            <div class="input-group">
                <label for="tk-tickets">Tickets (Every 4 = 1 Pt)</label>
                <input type="number" id="tk-tickets" min="0" value="0" oninput="calculateTicketPoints()">
            </div>
            <div class="input-group">
                <label for="tk-scam">Scam Tickets (Every 2 = 1 Pt)</label>
                <input type="number" id="tk-scam" min="0" value="0" oninput="calculateTicketPoints()">
            </div>
            <div class="input-group">
                <label for="tk-xp">XP (Every 1500 = 1 Pt)</label>
                <input type="number" id="tk-xp" min="0" value="0" oninput="calculateTicketPoints()">
            </div>
            <div class="input-group">
                <label for="tk-bans">Bans (Every 5 = 1 Pt)</label>
                <input type="number" id="tk-bans" min="0" value="0" oninput="calculateTicketPoints()">
            </div>
            
            <div class="result-panel">
                <span class="result-title">Total Points:</span>
                <span id="ticket-total" class="points-display">0.00</span>
            </div>
        </section>

        <!-- Chat Team Section -->
        <section id="chat" class="team-section">
            <h2>Chat Team System</h2>
            <div class="input-group">
                <label for="ch-xp">XP (Every 750 = 1 Pt)</label>
                <input type="number" id="ch-xp" min="0" value="0" oninput="calculateChatPoints()">
            </div>
            <div class="input-group">
                <label for="ch-warns">Warns (Every 3 = 1 Pt)</label>
                <input type="number" id="ch-warns" min="0" value="0" oninput="calculateChatPoints()">
            </div>
            <div class="input-group">
                <label for="ch-events">Events (Every 1 = 10 Pts)</label>
                <input type="number" id="ch-events" min="0" value="0" oninput="calculateChatPoints()">
            </div>

            <div class="result-panel">
                <span class="result-title">Total Points:</span>
                <span id="chat-total" class="points-display">0.00</span>
            </div>
        </section>

        <!-- Voice Team Section -->
        <section id="voice" class="team-section">
            <h2>Voice Team System</h2>
            <div class="input-group">
                <label for="vc-xp">Voice XP (Every 1500 = 1 Pt)</label>
                <input type="number" id="vc-xp" min="0" value="0" oninput="calculateVoicePoints()">
            </div>
            <div class="input-group">
                <label for="vc-warns">Voice Warns (Every 3 = 1 Pt)</label>
                <input type="number" id="vc-warns" min="0" value="0" oninput="calculateVoicePoints()">
            </div>
            <div class="input-group">
                <label for="vc-events">Events in Chat (Every 1 = 10 Pts)</label>
                <input type="number" id="vc-events" min="0" value="0" oninput="calculateVoicePoints()">
            </div>
            <div class="input-group">
                <label for="vc-stage">Stages (Every 1 = 15 Pts)</label>
                <input type="number" id="vc-stage" min="0" value="0" oninput="calculateVoicePoints()">
            </div>

            <div class="result-panel">
                <span class="result-title">Total Points:</span>
                <span id="voice-total" class="points-display">0.00</span>
            </div>
        </section>

    </div>

    <script>
        // دالة التنقل الفوري بين القوائم بدون إعادة تحميل الصفحة
        function switchTab(teamId) {
            // إخفاء جميع الأقسام
            document.querySelectorAll('.team-section').forEach(section => {
                section.classList.remove('active');
            });
            // إزالة الحالة النشطة من الأزرار
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // إظهار القسم المطلوب وتفعيل زره
            document.getElementById(teamId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // حساب نقاط تيم الـ Ticket
        function calculateTicketPoints() {
            const tickets = parseFloat(document.getElementById('tk-tickets').value) || 0;
            const scam = parseFloat(document.getElementById('tk-scam').value) || 0;
            const xp = parseFloat(document.getElementById('tk-xp').value) || 0;
            const bans = parseFloat(document.getElementById('tk-bans').value) || 0;

            const total = (tickets / 4) + (scam / 2) + (xp / 1500) + (bans / 5);
            document.getElementById('ticket-total').innerText = total.toFixed(2);
        }

        // حساب نقاط تيم الـ Chat
        function calculateChatPoints() {
            const xp = parseFloat(document.getElementById('ch-xp').value) || 0;
            const warns = parseFloat(document.getElementById('ch-warns').value) || 0;
            const events = parseFloat(document.getElementById('ch-events').value) || 0;

            const total = (xp / 750) + (warns / 3) + (events * 10);
            document.getElementById('chat-total').innerText = total.toFixed(2);
        }

        // حساب نقاط تيم الـ Voice
        function calculateVoicePoints() {
            const xp = parseFloat(document.getElementById('vc-xp').value) || 0;
            const warns = parseFloat(document.getElementById('vc-warns').value) || 0;
            const events = parseFloat(document.getElementById('vc-events').value) || 0;
            const stage = parseFloat(document.getElementById('vc-stage').value) || 0;

            const total = (xp / 1500) + (warns / 3) + (events * 10) + (stage * 15);
            document.getElementById('voice-total').innerText = total.toFixed(2);
        }
    </script>
</body>
</html>
